name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - run: ./bin/just check

  release:
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: ./bin/just release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
